version: "2"

run:
  go: "1.25.6"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - dupl
    - nodeepimports
    - readfriendlyorder
  settings:
    custom:
      nodeepimports:
        type: "module"
        settings:
          module-root: "github.com/skhoroshavin/gounslop"
      readfriendlyorder:
        type: "module"

linters-settings:
  dupl:
    threshold: 100

formatters:
  enable:
    - gofmt
    - goimports
