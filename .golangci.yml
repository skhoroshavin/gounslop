version: "2"

run:
  go: "1.25.6"

linters:
  enable:
    - gounslop
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - dupl
    - revive
  settings:
    custom:
      gounslop:
        type: "module"
        settings:
          disable:
            - nospecialunicode
            - nounicodeescape
          architecture:
            pkg/rule/*:
              imports: ["pkg/core/*"]
              exports: ["NewAnalyzer"]
            pkg/gounslop:
              imports: ["pkg/core/*", "pkg/rule/*"]
            plugin:
              imports: ["pkg/gounslop"]
            tests:
              imports: ["pkg/gounslop"]
    dupl:
      threshold: 100
    revive:
      rules:
        - name: cyclomatic
          arguments: [8]
        - name: argument-limit
          arguments: [4]
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports
